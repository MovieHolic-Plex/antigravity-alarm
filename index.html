<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Antigravity Dashboard</title>
  <style>
    :root {
      --bg: #1e1e2e;
      --text: #cdd6f4;
      --subtext: #a6adc8;
      --accent: #cba6f7;
      --item-bg: #313244;
      --item-hover: #45475a;
    }
    body {
      margin: 0; padding: 0;
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      background-color: var(--bg); color: var(--text);
      display: flex; flex-direction: column; height: 100vh;
      overflow: hidden;
    }
    .header {
      padding: 20px; background-color: #11111b;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #313244;
    }
    .header h2 { margin: 0; font-size: 18px; font-weight: 600; color: var(--accent); }
    .clear-btn { 
      background: #f38ba8; color: #11111b; border: none; padding: 6px 12px;
      border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold;
      transition: background 0.2s;
    }
    .clear-btn:hover { background: #ffb4c6; }
    
    .list {
      flex: 1; padding: 15px; overflow-y: auto;
    }
    .empty {
      text-align: center; color: var(--subtext); margin-top: 80px; font-size: 15px;
    }
    
    .noti-item {
      background: var(--item-bg); border-radius: 8px; padding: 15px;
      margin-bottom: 12px; cursor: pointer; transition: 0.2s;
      border-left: 4px solid var(--accent);
    }
    .noti-item:hover { background: var(--item-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); } /* 마우스 올렸을 때 클릭 유도 */
    .noti-title {
      font-weight: bold; color: #89b4fa; font-size: 15px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .noti-time { font-size: 12px; color: var(--subtext); font-weight: normal; }
    .noti-msg { font-size: 14px; line-height: 1.5; color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <h2>🚀 Antigravity Alarms</h2>
    <button class="clear-btn" id="clearBtn">모두 지우기</button>
  </div>
  <div class="list" id="list">
    <div class="empty">대기 중인 알람이 없습니다.<br><br>AI 작업이 끝나면 여기에 쌓입니다!</div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    const listEl = document.getElementById('list');
    
    document.getElementById('clearBtn').addEventListener('click', () => {
      ipcRenderer.send('clear-all');
    });

    ipcRenderer.on('update-list', (event, notifications) => {
      if (notifications.length === 0) {
        listEl.innerHTML = '<div class="empty">대기 중인 알람이 없습니다.<br><br>AI 작업이 끝나면 여기에 쌓입니다!</div>';
        return;
      }

      listEl.innerHTML = '';
      notifications.forEach(noti => {
        const item = document.createElement('div');
        item.className = 'noti-item';
        item.innerHTML = `
          <div class="noti-title">
            <span>[📁 ${noti.workspace}]</span>
            <span class="noti-time">${noti.time}</span>
          </div>
          <div class="noti-msg">${noti.message}</div>
          <div style="margin-top: 8px; font-size: 11px; color: #a6adc8;">👆 클릭하면 전체화면으로 포커스 됩니다.</div>
        `;
        // 클릭하면 해당 IDE로 창 열기 이벤트 송출
        item.addEventListener('click', () => {
          ipcRenderer.send('click-notification', noti.id);
        });
        listEl.appendChild(item);
      });
    });
  </script>
</body>
</html>
